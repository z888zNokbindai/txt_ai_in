<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI System Instructions Hub</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --sidebar-bg: #252538;
            --text-color: #cdd6f4;
            --accent-color: #cba6f7;
            --border-color: #45475a;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }
        #sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
        }
        h3 {
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        #file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }
        #file-list li {
            padding: 10px;
            cursor: pointer;
            border-radius: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
            font-size: 14px;
        }
        #file-list li:hover {
            background: #313244;
        }
        #file-list li.active {
            background: var(--accent-color);
            color: #11111b;
            font-weight: bold;
        }
        #viewer {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #file-title {
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        #content {
            flex-grow: 1;
            background: #11111b;
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            line-height: 1.5;
        }
        .error { color: #f38ba8; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>System Instructions</h3>
        <ul id="file-list"><li>กำลังโหลดรายชื่อไฟล์...</li></ul>
    </div>

    <div id="viewer">
        <h2 id="file-title">ยินดีต้อนรับ</h2>
        <div id="content">กำลังดึงข้อมูลระบบจาก GitHub...</div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const isGitHubPages = window.location.hostname.includes('github.io');
        
        // กำหนดโฟลเดอร์ที่เก็บไฟล์ .txt
        const FOLDER_PATH = 'instructions'; 

        async function init() {
            let owner = '';
            let repo = '';

            if (isGitHubPages) {
                owner = window.location.hostname.split('.')[0];
                repo = pathParts[0];
            } else {
                owner = 'YOUR_GITHUB_USERNAME';
                repo = 'YOUR_REPO_NAME';
            }

            const fileList = document.getElementById('file-list');
            const fileTitle = document.getElementById('file-title');
            const contentDiv = document.getElementById('content');

            try {
                // เพิ่ม Query String เพื่อบายพาส Cache ของ GitHub API บังคับให้ส่งข้อมูลล่าสุดเสมอ
                const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${FOLDER_PATH}?_=${new Date().getTime()}`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('ไม่สามารถเชื่อมต่อ GitHub API ได้');

                const data = await response.json();
                const txtFiles = data.filter(file => file.type === 'file' && file.name.endsWith('.txt'));

                if (txtFiles.length === 0) {
                    fileList.innerHTML = '<li>ไม่พบไฟล์ .txt</li>';
                    contentDiv.textContent = 'ไม่มีไฟล์ข้อความในโฟลเดอร์ที่ระบุ';
                    return;
                }

                fileList.innerHTML = '';
                txtFiles.sort((a, b) => a.name.localeCompare(b.name));

                txtFiles.forEach((file, index) => {
                    const li = document.createElement('li');
                    li.textContent = file.name;
                    
                    li.addEventListener('click', async () => {
                        document.querySelectorAll('#file-list li').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        
                        fileTitle.textContent = file.name;
                        contentDiv.textContent = 'กำลังโหลดเนื้อหา...';
                        
                        try {
                            // เพิ่มตัวทำลาย Cache สำหรับเนื้อหาไฟล์เช่นกัน เผื่อเวลาคุณเข้าไปแก้ข้อความข้างในไฟล์
                            const res = await fetch(`${file.download_url}?_=${new Date().getTime()}`);
                            contentDiv.textContent = await res.text();
                        } catch (e) {
                            contentDiv.textContent = 'เกิดข้อผิดพลาดในการโหลดเนื้อหาไฟล์';
                        }
                    });

                    fileList.appendChild(li);
                    if (index === 0) li.click();
                });

            } catch (error) {
                fileList.innerHTML = '<li class="error">โหลดล้มเหลว</li>';
                contentDiv.innerHTML = `<span class="error">เกิดข้อผิดพลาดในการดึงข้อมูล ลองรีเฟรชหน้าเว็บอีกครั้ง</span>`;
            }
        }

        init();
    </script>
</body>
</html>
